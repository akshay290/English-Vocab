version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sscvocab
      POSTGRES_PASSWORD: sscvocab_secret
      POSTGRES_DB: sscvocab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sscvocab"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://sscvocab:sscvocab_secret@db:5432/sscvocab
      SESSION_SECRET: change_me_in_production_use_a_long_random_string
      ADMIN_PASSWORD: sscvocab@admin2024
      PORT: "8080"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: artifacts/ssc-vocab/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
